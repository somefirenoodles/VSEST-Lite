name: Generate VSEST-Lite Reports

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]

permissions:
  contents: write
  issues: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate reports
        run: python scripts/generate_reports.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated reports
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/02_trazabilidad/matriz_ejecucion.md
            git add docs/03_riesgos/README.md
            git add docs/05_seguridad/README.md
            git add docs/06_evaluacion/instrumento_producto.md
            git add docs/08_tablero/tablero_vsest_lite.md
            git add docs/10_dashboard/resumen_estado.md
            git commit -m "Generar matrices VSEST-Lite"
            git push
          else
            echo "No hay cambios para guardar."
          fi
